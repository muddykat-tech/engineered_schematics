
[ores]

	#Ore Generation Config - Acanthite
	[ores.Acanthite]
		#Can this Mineral / Ore generate in world, if set to false this mineral will not spawn in world, unless a secondary mineral happens to include it as an assoicate mineral for spawning.
		canSpawn = true
		#how dense is the vein? 0 for all stone, 1 for all ore
		#Range: 0.0 ~ 1.0
		density = 0.85
		#The maximum size of a vein. Set to 0 to disable generation
		#Range: > 0
		vein_size = 24
		#The maximum Y coordinate this ore can spawn at
		#Range: > -2147483648
		max_y = 212
		#The minimum Y coordinate this ore can spawn at
		#Range: > -2147483648
		min_y = -64
		#The number of veins attempted to be generated per chunk
		#Range: > 0
		attempts_per_chunk = 1
		#The chance that this mineral is selected for a vein to generate in a chunk, 50000 is a guaranteed spawn 0 prevents spawns
		#Range: 0 ~ 50000
		generation_chance = 1200
		#Controls ore quality distribution. Lower values favor richer ores, while higher values increase the likelihood of poorer ores. 50 is balanced.
		#Range: 0 ~ 100
		rarity = 30
		#If enabled, mineral vein will only have a chance to spawn once every [16] chunks on average, inplace of every chunk.
		useSparsePlacement = false
		#The type of generation that is used for this mineral
		#Allowed Values: DEFAULT, BANDED, EVAPORATE, TUBE
		generationPattern = "TUBE"
		#The chance that this material will generate with any additional 'friend' materials
		#Range: 0.0 ~ 1.0
		associateChance = 1.0
		#The minimum temperature that this material can spawn in
		#Range: -2.0 ~ 2.0
		min_temp = -1.0
		#The maximum temperature that this material can spawn in
		#Range: -2.0 ~ 2.0
		max_temp = 2.0
		#The minimum downfall that this material can spawn in
		#Range: 0.0 ~ 1.0
		min_downfall = 0.0
		#The maximum downfall that this material can spawn in
		#Range: 0.0 ~ 1.0
		max_downfall = 1.0
		#A List of dimensions that this ore can generate in.
		dimension_whitelist = ["minecraft:overworld", "minecraft:the_nether", "minecraft:the_end"]

